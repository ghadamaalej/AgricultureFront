spring.application.name=gateway
#spring.config.import=optional:configserver:http://localhost:8888
spring.cloud.config.fail-fast=false

server.port=8089

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.hostname=localhost
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.cloud.loadbalancer=DEBUG

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.info.env.enabled=true
info.app.name=gateway
info.app.version=0.0.1-SNAPSHOT

#spring.cloud.gateway.server.webmvc.routes[0].id=livraison-service
#spring.cloud.gateway.server.webmvc.routes[0].uri=lb://LIVRAISON-SERVICE
#spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/livraison/**
#spring.cloud.gateway.server.webmvc.routes[0].filters[0]=StripPrefix=1
#Gestion user
spring.cloud.gateway.server.webmvc.routes[0].id=gestion-user
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://GESTION-USER
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/user/**
spring.cloud.gateway.server.webmvc.routes[0].filters[0]=StripPrefix=1

