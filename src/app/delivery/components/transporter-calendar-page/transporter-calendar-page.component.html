<div class="page-container">
  <div class="page-header">
    <h1>Calendrier des Livraisons</h1>
    <p class="page-description">Visualisez et gérez votre planning de livraisons mensuel</p>
  </div>

  <div class="page-content">
    <app-transporter-calendar 
      [transporteurId]="currentUserId"
      (dateSelected)="onDateSelected($event)"
      (deliverySelected)="onDeliverySelected($event)">
    </app-transporter-calendar>
  </div>
</div>
