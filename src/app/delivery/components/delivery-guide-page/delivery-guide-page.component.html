<section class="delivery-guide">
  <header class="delivery-guide-header">
    <h2><i class="fas fa-circle-info"></i> Guide livraison</h2>
    <p>Cette page est 100% front pour vous orienter rapidement dans les actions principales.</p>
  </header>

  <div class="delivery-guide-grid">
    <article class="guide-card" *ngFor="let item of highlights">
      <h3>{{ item.title }}</h3>
      <p>{{ item.text }}</p>
    </article>
  </div>
</section>
