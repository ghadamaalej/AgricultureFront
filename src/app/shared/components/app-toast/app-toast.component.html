<div class="toast-container">
  <div
    class="toast"
    *ngFor="let toast of (toasts$ | async); trackBy: trackByToastId"
    [ngClass]="toast.type"
    [style.--duration]="(toast.duration || 3500) + 'ms'"
  >
    <div class="toast-icon">
      <span *ngIf="toast.type === 'success'">✔</span>
      <span *ngIf="toast.type === 'error'">✖</span>
      <span *ngIf="toast.type === 'warning'">⚠</span>
      <span *ngIf="toast.type === 'info'">ℹ</span>
    </div>

    <div class="toast-content">{{ toast.text }}</div>

    <button class="toast-close" type="button" (click)="closeToast(toast.id)" aria-label="Fermer">
      ×
    </button>
  </div>
</div>
