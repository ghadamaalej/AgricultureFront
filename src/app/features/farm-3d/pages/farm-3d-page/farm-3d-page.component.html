<div class="farm-3d-page">
  <div class="page-header">
    <div class="container">
      <div class="section-header">
        <div class="section-label">
          <i class="fas fa-cubes"></i> Agriculture 3D
        </div>
        <h1 class="section-title">
          Gestion <span>3D</span> des Terrains
        </h1>
        <p class="section-desc">
          Visualisez et gérez vos terrains agricoles en 3D. Créez de nouveaux terrains,
          consultez vos parcelles existantes et planifiez vos cultures avec précision.
        </p>
      </div>
    </div>
  </div>

  <!-- Success/Error Messages -->
  <div class="container">
    <div *ngIf="success" class="alert alert-success">
      <i class="fas fa-check-circle"></i>
      {{ success }}
    </div>

    <div *ngIf="error" class="alert alert-error">
      <i class="fas fa-exclamation-circle"></i>
      {{ error }}
    </div>
  </div>

  <!-- Main Content -->
  <div class="container">
    <div class="farm-3d-layout">

      <!-- Left Panel -->
      <div class="left-panel">
        <!-- Terrain Form -->
        <app-terrain-form
          (terrainCreated)="onTerrainCreated($event)">
        </app-terrain-form>

        <!-- Terrain List -->
        <app-terrain-list
          [terrains]="terrains"
          [selectedTerrain]="selectedTerrain"
          [loading]="loading"
          (terrainSelected)="onTerrainSelected($event)"
          (terrainDeleted)="onTerrainDeleted($event)"
          (terrainEditRequested)="onTerrainEditRequested($event)">
        </app-terrain-list>
      </div>

      <!-- Right Panel -->
      <div class="right-panel">
        <app-terrain-viewer-3d
          [selectedTerrain]="selectedTerrain">
        </app-terrain-viewer-3d>
      </div>

    </div>
  </div>
</div>
