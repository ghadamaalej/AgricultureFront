<div class="modal-overlay" (click)="cancelled.emit()">
  <div class="modal-box" (click)="$event.stopPropagation()">

    <div class="modal-header">
      <h2>{{ isEdit ? 'Modifier le produit' : 'Ajouter un produit' }}</h2>
      <button class="close-btn" (click)="cancelled.emit()"><i class="fas fa-times"></i></button>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="modal-body">

      <div class="form-row">
        <div class="form-group full">
          <label>Nom du produit *</label>
          <input formControlName="nom" placeholder="ex: Engrais NPK" [class.err]="invalid('nom')">
          <span class="err-msg" *ngIf="invalid('nom')">Champ requis</span>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Catégorie *</label>
          <select formControlName="categorie" [class.err]="invalid('categorie')">
            <option value="">-- choisir --</option>
            <option *ngFor="let c of categories" [value]="c">{{ catLabels[c] }}</option>
          </select>
          <span class="err-msg" *ngIf="invalid('categorie')">Champ requis</span>
        </div>
        <div class="form-group">
          <label>Unité *</label>
          <input formControlName="unit" placeholder="kg, L, pièce…" [class.err]="invalid('unit')">
          <span class="err-msg" *ngIf="invalid('unit')">Champ requis</span>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group full">
          <label>Seuil minimum *</label>
          <input type="number" formControlName="minThreshold" min="0" [class.err]="invalid('minThreshold')">
          <span class="err-msg" *ngIf="invalid('minThreshold')">Valeur ≥ 0 requise</span>
        </div>
      </div>

      <div class="form-row">
        <label class="checkbox-label">
          <input type="checkbox" formControlName="isPerishable">
          <span>Produit périssable</span>
        </label>
      </div>

      <div class="form-hint">
        Le stock, le prix et les dates de péremption se gèrent ensuite depuis l'interface <strong>Lots</strong>.
      </div>

      <div class="err-msg" *ngIf="error" style="margin-top:8px;">{{ error }}</div>

      <div class="modal-footer">
        <button type="button" class="btn btn-cancel" (click)="cancelled.emit()">Annuler</button>
        <button type="submit" class="btn btn-save" [disabled]="loading">
          <i class="fas fa-spinner fa-spin" *ngIf="loading"></i>
          {{ isEdit ? 'Enregistrer' : 'Créer' }}
        </button>
      </div>

    </form>
  </div>
</div>
