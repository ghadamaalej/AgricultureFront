<div class="modal-overlay" (click)="cancelled.emit()">
  <div class="modal-box" (click)="$event.stopPropagation()">

    <div class="modal-header">
      <h2><i class="fas fa-calendar-plus" style="color:#6a1aa8;margin-right:8px;"></i>Planifier une campagne de vaccination</h2>
      <button class="close-btn" (click)="cancelled.emit()"><i class="fas fa-times"></i></button>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="modal-body">

      <div class="form-row">
        <div class="form-group full">
          <label>Espèce ciblée *</label>
          <input formControlName="espece" placeholder="ex: Vache, Mouton, Chèvre…"
                 [class.err]="invalid('espece')">
          <span class="err-msg" *ngIf="invalid('espece')">Champ requis</span>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Âge min (ans) *</label>
          <input type="number" formControlName="ageMin" min="0"
                 placeholder="0" [class.err]="invalid('ageMin')">
          <span class="err-msg" *ngIf="invalid('ageMin')">Valeur ≥ 0 requise</span>
        </div>
        <div class="form-group">
          <label>Âge max (ans) *</label>
          <input type="number" formControlName="ageMax" min="0"
                 placeholder="10" [class.err]="invalid('ageMax')">
          <span class="err-msg" *ngIf="invalid('ageMax')">Valeur ≥ 0 requise</span>
        </div>
        <div class="form-group">
          <label>Date planifiée *</label>
          <input type="date" formControlName="plannedDate" [class.err]="invalid('plannedDate')">
          <span class="err-msg" *ngIf="invalid('plannedDate')">Date requise</span>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Produit vaccin *</label>
          <div *ngIf="loadingProds" class="loading-small"><i class="fas fa-spinner fa-spin"></i> Chargement…</div>
          <select *ngIf="!loadingProds" formControlName="productId" [class.err]="invalid('productId')">
            <option [value]="null">-- sélectionner --</option>
            <option *ngFor="let p of products" [value]="p.id">{{ p.nom }} ({{ p.currentQuantity }} {{ p.unit }})</option>
          </select>
          <span class="err-msg" *ngIf="!loadingProds && products.length === 0">
            Aucun produit VACCIN dans votre inventaire.
          </span>
          <span class="err-msg" *ngIf="invalid('productId')">Sélection requise</span>
        </div>
        <div class="form-group">
          <label>Dose par animal *</label>
          <input type="number" formControlName="dose" min="0.01" step="0.01"
                 placeholder="ex: 2.5" [class.err]="invalid('dose')">
          <span class="err-msg" *ngIf="invalid('dose')">Dose > 0 requise</span>
        </div>
      </div>

      <div class="err-msg global" *ngIf="error">{{ error }}</div>

      <div class="modal-footer">
        <button type="button" class="btn btn-cancel" (click)="cancelled.emit()">Annuler</button>
        <button type="submit" class="btn btn-save" [disabled]="loading || loadingProds">
          <i class="fas fa-spinner fa-spin" *ngIf="loading"></i>
          Planifier
        </button>
      </div>

    </form>
  </div>
</div>
