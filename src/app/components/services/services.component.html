<section class="services section-padding" id="services">
  <!-- Background pattern -->
  <div class="services-bg"></div>

  <div class="container">
    <div class="section-header reveal">
      <div class="section-label">
        <i class="fas fa-cogs"></i> Our Services
      </div>
      <h2 class="section-title">
        What We <span>Offer</span> You
      </h2>
      <p class="section-desc">
        Bridging the gap between field and market, GreenRoots brings together everyone in agriculture — from seed to sale, all in one place.
      </p>
    </div>

    <div class="services-grid">
      <div class="service-card reveal"
           *ngFor="let s of services; let i = index"
           [style.animation-delay]="(i * 0.1) + 's'">
        <div class="service-icon" [style.background]="s.color + '18'">
          <i [class]="s.icon" [style.color]="s.color"></i>
        </div>
        <h3 class="service-title">{{ s.title }}</h3>
        <p class="service-desc">{{ s.desc }}</p>
        <a class="service-link" [style.color]="s.color">
          Learn More <i class="fas fa-arrow-right"></i>
        </a>
        <div class="card-hover-bar" [style.background]="s.color"></div>
      </div>
    </div>
  </div>
</section>
